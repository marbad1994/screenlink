<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCast - Interactive Demo</title>
    <link rel="stylesheet" href="streaming.css">
</head>
<body>
    <!-- Tall scroll container to drive the animation -->
    <div class="scroll-driver" id="scroll-driver"></div>

    <!-- Fixed viewport — everything renders here -->
    <div class="viewport" id="viewport">

        <!-- Title overlay — fades in at end -->
        <div class="title-overlay" id="title-overlay">
            <h1 class="title">StreamCast</h1>
            <p class="subtitle">Your movies. Your couch. Your rules.</p>
        </div>

        <!-- The scene — gets scaled down as you scroll -->
        <div class="scene" id="scene">

            <!-- Person from behind -->
            <div class="person" id="person">
                <div class="person-head"></div>
                <div class="person-body"></div>
                <div class="person-shoulder-l"></div>
                <div class="person-shoulder-r"></div>
            </div>

            <!-- held-phone removed, final-phone handles the animation -->

            <!-- Couch (behind person, revealed on zoom out) -->
            <div class="couch" id="couch">
                <div class="couch-back"></div>
                <div class="couch-seat"></div>
                <div class="couch-arm-l"></div>
                <div class="couch-arm-r"></div>
            </div>

            <!-- TV (behind everything, revealed on zoom out) -->
            <div class="tv" id="tv">
                <div class="tv-screen" id="tv-screen">
                    <div class="tv-off-state" id="tv-off">
                        <div class="tv-brand">StreamCast</div>
                    </div>
                    <div class="tv-playing" id="tv-playing">
                        <video id="demo-video" loop muted playsinline>
                            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                        </video>
                        <div class="tv-cast-badge" id="tv-cast-badge">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                            </svg>
                            Casting
                        </div>
                        <div class="tv-paused-icon" id="tv-paused-icon">&#x23F8;</div>
                    </div>
                </div>
                <div class="tv-stand"></div>
                <div class="tv-stand-base"></div>
            </div>
        </div>

        <!-- Standalone phone with app (appears at final position) -->
        <div class="final-phone" id="final-phone">
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <div class="phone-screen" id="phone-screen">
                    <!-- Watching view (video playing on phone) -->
                    <div class="app-view" id="watching-view">
                        <div class="watching-video-wrap">
                            <video id="phone-video" loop muted playsinline autoplay>
                                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                            </video>
                            <div class="phone-movie-overlay">
                                <div class="phone-movie-title">Big Buck Bunny</div>
                                <div class="phone-progress-bar"><div class="phone-progress-fill"></div></div>
                            </div>
                        </div>
                    </div>
                    <!-- Pre-cast view (Stream to Device button) -->
                    <div class="app-view hidden" id="precast-view">
                        <div class="app-header"><span class="app-logo">StreamCast</span></div>
                        <div class="precast-content">
                            <div class="precast-thumb bbb-thumb"></div>
                            <div class="precast-title">Big Buck Bunny</div>
                            <div class="precast-meta">Animation — 9:56</div>
                            <button class="cast-btn" onclick="castToTV()">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                                </svg>
                                Stream to Device
                            </button>
                        </div>
                    </div>
                    <!-- Remote view -->
                    <div class="app-view hidden" id="remote-view">
                        <div class="remote-header">
                            <div class="remote-now-playing">
                                <div class="remote-thumb bbb-thumb"></div>
                                <div class="remote-info">
                                    <div class="remote-title">Big Buck Bunny</div>
                                    <div class="remote-meta">Casting to TV</div>
                                </div>
                            </div>
                        </div>
                        <div class="remote-body">
                            <button class="remote-btn-wide" onclick="togglePlay()">
                                <span id="playpause-icon">&#x23F5; &#x23F8;</span>
                            </button>
                            <div class="remote-row">
                                <button class="remote-btn" onclick="adjustVolume(-1)"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg></button>
                                <button class="remote-btn" onclick="adjustVolume(1)"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
                            </div>
                            <div class="remote-row">
                                <button class="remote-btn" onclick="toggleFullscreen()"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
                                <button class="remote-btn" onclick="toggleMute()" id="btn-mute"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg></button>
                            </div>
                            <div class="remote-row">
                                <button class="remote-btn" onclick="seek(-10)"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
                                <button class="remote-btn" onclick="seek(10)"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg></button>
                            </div>
                            <div class="remote-row">
                                <button class="remote-btn" onclick="stopCast()"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
                                <button class="remote-btn" onclick="seek(30)"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="phone-homebar"></div>
            </div>
        </div>

        <!-- Scroll hint -->
        <div class="scroll-hint" id="scroll-hint">
            <div class="scroll-arrow">&#x2193;</div>
            <span>Scroll to zoom out</span>
        </div>
    </div>

    <!-- Volume popup -->
    <div class="volume-popup" id="volume-popup">
        <div class="volume-icon">&#x1F50A;</div>
        <div class="volume-bar-bg"><div class="volume-bar-fill" id="volume-fill"></div></div>
        <span class="volume-pct" id="volume-pct">75%</span>
    </div>

    <script src="streaming.js"></script>
</body>
</html>
